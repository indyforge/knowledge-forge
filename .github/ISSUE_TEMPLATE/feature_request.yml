name: Feature request
description: Suggest a focused feature for source-backed maintainer workflows.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Maintainer problem
      description: What maintenance task would become easier, safer, or more reviewable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior and the expected output artifact.
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Provenance model
      description: What source links, local artifacts, hashes, timestamps, assets, or evidence gaps should be preserved?
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This can work without hidden cloud sync or background writes.
        - label: This can be tested with synthetic or explicitly public fixtures.
        - label: This does not require committing private captures or personal vault paths.
