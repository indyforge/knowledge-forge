name: Bug report
description: Report a reproducible problem in capture, manifests, Markdown output, or CLI behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the command, fixture, or input shape needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste relevant note, manifest, or test output. Redact private paths, cookies, tokens, and personal captures.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, and any relevant shell details.
    validations:
      required: false
